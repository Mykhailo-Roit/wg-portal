---
services:
  db:
    image: postgres:17-alpine
    container_name: wg-portal-test-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wgportal
      POSTGRES_USER: wgportal
      POSTGRES_PASSWORD: wgportal
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wgportal -d wgportal"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - wg-portal-test-db:/var/lib/postgresql/data

  app:
    image: ${APP_IMAGE}
    container_name: wg-portal-test-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WG_PORTAL_CONFIG: /app/config/test.config.yml
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "8888:8888"
      - "8787:8787"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8888/app/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - ./docker/test/config.yml:/app/config/test.config.yml:ro
      - ./.artifacts/runtime/data:/app/data
      - ./.artifacts/runtime/config:/etc/wireguard

  toolbox:
    build:
      context: .
      dockerfile: docker/test-toolbox.Dockerfile
    container_name: wg-portal-test-toolbox
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      APP_BASE_URL: http://app:8888
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: wgportal
      POSTGRES_USER: wgportal
      POSTGRES_PASSWORD: wgportal
    working_dir: /workspace
    entrypoint: ["sleep", "infinity"]
    volumes:
      - .:/workspace
      - ./.artifacts:/artifacts

volumes:
  wg-portal-test-db:
